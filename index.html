<html lang="en">

    <meta name="theme-color" content="#0f172a" />

    <!-- Title -->

      content="Frontend developer specializing in React, TypeScript, and accessible UI. Building performant, scalable, and WCAG-compliant interfaces."

    <meta property="og:title" content="Danny McKinney | Frontend Developer" />

      property="og:description"
      content="Frontend developer focused on React, TypeScript, and accessible UI."

      name="twitter:description"
      content="Frontend developer specializing in React, TypeScript, and accessible UI."
    />
    <meta name="twitter:image" content="https://www.dannymckinney.dev/preview.png" />

    <link rel="canonical" href="https://www.dannymckinney.dev/" />
